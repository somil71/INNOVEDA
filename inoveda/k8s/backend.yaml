apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  ports:
    - port: 8000
  selector:
    app: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: inoveda-api:latest # To be updated with actual registry
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:postgres@db:5432/inoveda"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
#            - name: USE_AWS_SECRETS
#              value: "true"
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
            requests:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: inoveda-api:latest
          command: ["celery", "-A", "celery_app", "worker", "--loglevel=info"]
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:postgres@db:5432/inoveda"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
          resources:
            limits:
              cpu: "1"
              memory: "2Gi"
            requests:
              cpu: "500m"
              memory: "1Gi"
